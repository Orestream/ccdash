version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*github.com/gorilla/websocket.Conn).Close

formatters:
  enable:
    - gofmt
